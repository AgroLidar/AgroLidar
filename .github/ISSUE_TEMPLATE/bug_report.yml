name: Bug report
description: Report a reproducible defect in code, pipeline, or tooling
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce and fix it.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the problem
      placeholder: API returns 500 during inference with valid payload
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make serve`
        2. POST sample payload to /predict
        3. Observe stack trace
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      placeholder: |
        - OS:
        - Python version:
        - CUDA/CPU runtime:
        - Commit SHA:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / tracebacks / artifacts
      description: Paste relevant logs or attach report files.
