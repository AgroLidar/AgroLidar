name: Documentation improvement
description: Report unclear, outdated, or missing documentation
title: "[Docs] "
labels: ["documentation", "needs-triage"]
body:
  - type: input
    id: location
    attributes:
      label: Affected page or file
      placeholder: docs/usage.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Who is impacted?
      placeholder: "New integrators, deployment engineers, maintainers"
    validations:
      required: true
  - type: textarea
    id: recommendation
    attributes:
      label: Suggested update
      description: Provide proposed text, structure, or examples if possible.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I verified this issue is not already covered in docs/index.md.
          required: true
