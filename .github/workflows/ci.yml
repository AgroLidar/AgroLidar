name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .[dev]
      - run: ruff check lidar_perception/ scripts/ tests/
      - run: mypy lidar_perception/ --strict --ignore-missing-imports

  python-test:
    name: Python Tests (CPU)
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .[dev]
      - run: pytest tests/ --cov=lidar_perception --cov-fail-under=80 -v

  safety-regression:
    name: Safety Metric Regression Gate
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .
      - name: Run safety evaluation on smoke dataset
        run: python scripts/evaluate.py --config configs/ci_smoke.yaml --fail-on-dangerous-fnr-above 0.10

  frontend-build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
      - run: npm run build
