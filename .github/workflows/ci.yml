name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff pytest
          pip install -r requirements.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple

      - name: Lint
        run: ruff check .

      - name: Tests
        run: pytest tests/ -v --tb=short

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  smoke-train:
    runs-on: ubuntu-latest
    needs: python-quality
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple

      - name: Generate synthetic dataset
        run: python scripts/generate_synthetic_data.py --train-samples 20 --val-samples 5

      - name: Train and evaluate
        run: |
          python scripts/train.py --config configs/train.yaml
          python scripts/evaluate.py --config configs/base.yaml

      - name: Export and validate ONNX
        run: |
          python scripts/export_onnx.py --checkpoint outputs/checkpoints/best.pt --output outputs/onnx/model.onnx --validate --simplify
          python scripts/validate_onnx.py --onnx-path outputs/onnx/model.onnx --checkpoint outputs/checkpoints/best.pt --n-samples 20

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-train-outputs
          path: outputs/
          retention-days: 7
