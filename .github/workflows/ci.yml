name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install tooling
        run: pip install ruff pytest

      - name: Install dependencies (CPU torch wheels)
        run: pip install -r requirements.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --tb=short

  evaluate-on-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple

      - name: Check if checkpoint exists
        id: checkpoint_check
        run: |
          if [ -f "outputs/checkpoints/best.pt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No checkpoint found, skipping evaluation."
          fi

      - name: Run evaluation
        if: steps.checkpoint_check.outputs.exists == 'true'
        run: python scripts/evaluate.py --config configs/base.yaml

      - name: Upload evaluation reports
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-reports
          path: outputs/reports/
          retention-days: 14

  smoke-train:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    outputs:
      mlflow_run_id: ${{ steps.export_mlflow_run_id.outputs.mlflow_run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies (CPU torch wheels)
        run: pip install -r requirements.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple

      - name: Generate synthetic dataset
        run: python scripts/generate_synthetic_data.py --train-samples 20 --val-samples 5

      - name: Train
        run: python scripts/train.py --config configs/train.yaml

      - name: Evaluate
        run: python scripts/evaluate.py --config configs/base.yaml

      - name: Export and validate ONNX
        run: |
          python scripts/export_onnx.py \
            --checkpoint outputs/checkpoints/best.pt \
            --output outputs/onnx/model.onnx \
            --validate --simplify
          python scripts/validate_onnx.py \
            --onnx-path outputs/onnx/model.onnx \
            --checkpoint outputs/checkpoints/best.pt \
            --n-samples 20

      - name: Assert ONNX artifacts exist
        run: |
          test -f outputs/onnx/model.onnx
          test -f outputs/onnx/export_metadata.json
          python -c "
          import json
          m = json.load(open('outputs/onnx/export_metadata.json'))
          assert m['validation_passed'], 'ONNX validation failed'
          print(f'ONNX validated. Max diff: {m[\"max_output_diff\"]:.2e}')
          print(f'ONNX speedup: {m[\"speedup_ratio\"]:.2f}x')
          "

      - name: Export latest MLflow run id
        id: export_mlflow_run_id
        run: |
          echo "mlflow_run_id=$(python scripts/get_latest_run_id.py)" >> $GITHUB_OUTPUT

      - name: Assert artifacts and report schema
        run: |
          test -f outputs/checkpoints/best.pt
          test -f outputs/reports/eval_report.json
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("outputs/reports/eval_report.json").read_text(encoding="utf-8"))
          required = {"mAP", "recall", "precision", "dangerous_fnr", "latency", "dangerous_class_aggregate_score", "per_class"}
          missing = sorted(required - set(report))
          if missing:
              raise SystemExit(f"Missing keys in eval report: {missing}")
          print("eval_report_keys_ok")
          PY

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smoke-train-outputs
          path: outputs/
          retention-days: 7

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnx-model
          path: outputs/onnx/
          retention-days: 30

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 7
          if-no-files-found: warn
