name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linting tools
        run: pip install ruff==0.6.9 mypy==1.13.0 pydantic==2.10.4 PyYAML==6.0.2
      - name: Ruff lint
        run: ruff check lidar_perception/ scripts/ tests/
      - name: Mypy type check
        run: mypy lidar_perception/ --strict --ignore-missing-imports

  python-test:
    name: Tests (CPU)
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run test suite
        run: pytest tests/ -v --tb=short

  safety-gate:
    name: Safety Regression Gate
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run safety tests
        run: pytest tests/safety/ -v --tb=short -x
        # -x = fail fast on first safety violation

  frontend:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        # stay on v4 until setup-node v6 migration is validated in this repo
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
