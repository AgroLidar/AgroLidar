name: Docs

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install docs tooling
        run: |
          pip install mkdocs mkdocs-material

      - name: Build docs
        run: mkdocs build
