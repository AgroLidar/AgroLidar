name: Docs Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'

permissions:
  contents: read

concurrency:
  group: docs-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-build:
    name: MkDocs Strict Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install docs tooling
        run: pip install mkdocs==1.6.1 mkdocs-material==9.5.46

      - name: Build docs (strict)
        run: mkdocs build --strict
