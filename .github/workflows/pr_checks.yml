name: Pull Request Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install tools
        run: pip install pre-commit ruff pytest pyyaml

      - name: Install dependencies (CPU torch wheels)
        run: pip install -r requirements.txt --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple

      - name: Check no .pt files in PR
        run: |
          if git diff origin/main...HEAD --name-only | grep -q "\.pt$"; then
            echo "ERROR: PR contains .pt checkpoint files. Remove them."
            exit 1
          fi

      - name: Check no secrets in diff (lightweight)
        run: |
          if git diff origin/main...HEAD | grep -iE "(api_key|secret|password|token)\s*=\s*['\"][^'\"]{8,}"; then
            echo "ERROR: Possible secret detected in diff."
            exit 1
          fi

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate all YAML configs
        run: |
          python -c "
          import glob
          import yaml

          for f in glob.glob('configs/*.yaml'):
              yaml.safe_load(open(f))
          print('All configs valid')
          "

      - name: Check PR has description
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          event_path = os.environ["GITHUB_EVENT_PATH"]
          payload = json.loads(pathlib.Path(event_path).read_text(encoding="utf-8"))
          body = (payload.get("pull_request", {}) or {}).get("body", "")
          if not body or not body.strip():
              raise SystemExit("ERROR: PR description is empty. Fill out the PR template.")
          print("PR description check passed.")
          PY
