name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run core tests
        run: pytest tests/ -q --tb=short

      - name: Validate changelog and release notes (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "## \[$VERSION\]" CHANGELOG.md || { echo "Missing CHANGELOG entry for $VERSION"; exit 1; }
          grep -q "Release date:" RELEASE_NOTES.md || { echo "RELEASE_NOTES.md must include release date"; exit 1; }

      - name: Validate release docs presence (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          test -f CHANGELOG.md || { echo "CHANGELOG.md is required"; exit 1; }
          test -f RELEASE_NOTES.md || { echo "RELEASE_NOTES.md is required"; exit 1; }

      - name: Archive release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ github.ref_name }}
          path: |
            CHANGELOG.md
            RELEASE_NOTES.md
            VERSION

  create-github-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body_path: RELEASE_NOTES.md
