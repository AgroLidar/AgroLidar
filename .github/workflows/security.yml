name: Security Scans

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks CLI (license-free)
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            zricethezav/gitleaks:v8.24.2 \
            dir /repo \
            --redact \
            --exit-code 1

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install Python tooling
        run: |
          pip install pip-audit

      - name: Run pip audit
        run: |
          pip-audit \
            -r requirements.audit.txt \
            --ignore-vuln CVE-2026-28500 \
            --ignore-vuln CVE-2026-4539

      - name: Install npm dependencies
        run: npm ci

      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
