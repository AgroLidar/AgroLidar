base_config: base.yaml

active_learning:
  max_candidates: 200
  min_score_threshold: 0.2
  entropy_weight: 1.0
  low_confidence_weight: 1.0
  edge_range_weight: 0.5
  rare_class_weight: 0.8
  ambiguous_dangerous_weight: 1.2
  review_queue_dir: data/review_queue
  manifest_path: data/review_queue/manifest.jsonl

  failure_thresholds:
    low_confidence: 0.25
    near_miss_distance_m: 8.0
    distance_error_m: 5.0
    track_distance_jump_m: 6.0
