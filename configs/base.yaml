# Config base mínima y funcional para evaluación en CPU.
# Incluye los campos solicitados y compatibilidad con los scripts actuales.

# Semilla global para reproducibilidad.
seed: 42

# Dispositivo preferido. "cpu" evita dependencia de GPU en GitHub runners.
device: cpu

# Directorio raíz de salidas (checkpoints, reportes, métricas, etc.).
output_dir: outputs

model:
  # Campo solicitado: checkpoint por defecto usado por el pipeline/evaluación.
  checkpoint: outputs/checkpoints/best.pt
  # Campo solicitado: dispositivo explícito para el modelo.
  device: cpu

  # Campos requeridos por build_model()/Trainer.
  name: pointpillars_bev
  in_channels: 4
  base_channels: 32
  num_classes: 5
  num_segmentation_classes: 6
  score_threshold: 0.35
  nms_iou_threshold: 0.2
  max_detections: 64
  max_candidates_per_class: 32

data:
  # Tipo de dataset sintético para no depender de archivos reales durante CI.
  dataset_type: bev_frame

  # Campo solicitado: ruta de validación (documentada para datasets reales).
  val_dir: data/val/

  # Rutas/tamaños base del generador sintético.
  root_dir: data/
  train_size: 0
  val_size: 0
  test_size: 0
  num_workers: 0

  # Campo solicitado: batch_size para evaluación.
  batch_size: 2

  # Parámetros requeridos por SyntheticLiDARDataset.
  num_points: 0
  class_names: [human, animal, rock, post, vehicle]
  dangerous_classes: [human, animal, rock, post, vehicle]
  segmentation_classes: [background, traversable_ground, vegetation, vehicle, human, obstacle]
  point_cloud_range: [-35.0, -25.0, -4.0, 55.0, 25.0, 5.0]
  grid_size: [128, 128]
  max_objects: 24
  train_dir: data/train/
  val_dir: data/val/
  test_dir: data/val/
  bev_channels: 4
  bev_height: 512
  bev_width: 512
  model_height: 128
  model_width: 128
  augmentations:
    enabled: false
  preprocessing:
    enabled: true

metrics:
  # Campo solicitado: clases consideradas de mayor riesgo.
  dangerous_classes: [human, animal, rock, post, vehicle]
  # Campo solicitado: umbral máximo permitido de FNR en clases peligrosas.
  dangerous_fnr_threshold: 0.05
  # Campo solicitado: umbral de latencia en milisegundos.
  latency_threshold_ms: 100

# Compatibilidad con compare_models.py (política de promoción opcional).
comparison:
  min_recall_gain: 0.0
  min_dangerous_fnr_drop: 0.0
  max_latency_regression_ms: 100.0
  max_robustness_gap_regression: 1.0

evaluation:
  # IoU usado para mAP global.
  iou_threshold: 0.25
  # IoU más estricto para clases peligrosas.
  dangerous_iou_threshold: 0.2
  # Warmup de benchmark de latencia.
  latency_warmup: 3
  # Iteraciones de benchmark de latencia.
  latency_iters: 20
  # Salida JSON de evaluación.
  save_json: outputs/reports/eval_report.json
  # Salida Markdown de evaluación.
  save_md: outputs/reports/eval_report.md

output:
  # Campo solicitado: directorio para reportes.
  report_dir: outputs/reports/
  # Campo solicitado: nombre base de reporte.
  report_name: eval_report
