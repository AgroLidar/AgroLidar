# Config mínima para entrenamiento.
# Mantiene los campos solicitados y agrega aliases esperados por train.py/Trainer.

# Hereda defaults de base para mantener consistencia.
base_config: base.yaml

model:
  # Campo solicitado: arquitectura lógica del experimento.
  architecture: bev_detection
  # Campos solicitados.
  num_classes: 5
  input_channels: 4

  # Campos reales requeridos por build_model().
  name: pointpillars_bev
  in_channels: 4
  base_channels: 32
  num_segmentation_classes: 6

training:
  # Campo solicitado: número de épocas.
  epochs: 1
  # Campo solicitado: learning rate.
  lr: 0.001
  # Alias efectivo usado por Trainer.
  learning_rate: 0.001
  # Campo solicitado: batch size de entrenamiento (documental).
  batch_size: 2
  # Campo solicitado: ruta de checkpoints.
  checkpoint_dir: outputs/checkpoints/

  # Campos requeridos por Trainer.
  weight_decay: 0.0001
  mixed_precision: false
  grad_clip_norm: 5.0
  losses:
    detection: 1.0
    segmentation: 1.0
    obstacle: 0.5

data:
  # Campo solicitado: directorio de train.
  train_dir: data/train/
  # Campo solicitado: directorio de val.
  val_dir: data/val/
  # Campo solicitado: batch size.
  batch_size: 2

  # Campos efectivos para el dataset actual.
  dataset_type: bev_frame
  root_dir: data/
  train_size: 0
  val_size: 0
  num_workers: 0
  num_points: 0
  point_cloud_range: [-35.0, -25.0, -4.0, 55.0, 25.0, 5.0]
  grid_size: [128, 128]
  max_objects: 24
  bev_channels: 4
  bev_height: 512
  bev_width: 512
  model_height: 128
  model_width: 128
  class_names: [human, animal, rock, post, vehicle]
  dangerous_classes: [human, animal, rock, post, vehicle]
  segmentation_classes: [background, traversable_ground, vegetation, vehicle, human, obstacle]
  augmentations:
    enabled: true
  preprocessing:
    enabled: true

# Campo solicitado: catálogo de clases principales.
classes: [human, animal, rock, post, vehicle]
